name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 3 * * *'  # every day at 11am UTC+8
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -s -o /dev/null -w "%{http_code}" "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/" -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          echo " Pinged Supabase"
